                    <div class="word-row${w.userChoice === true ? ' correct' : w.userChoice === false ? ' wrong' : ''}" id="rpw-${i}" data-clicks="0" onclick="window._toggleRPreWord(${i})">
                        <span class="word-text">${w.english}</span>
                        <span class="word-meaning" id="rpm-${i}" style="display:none;">${w.chinese}</span>
                        <button class="icon-btn" style="background:#dcece2;color:#3d5a48;" onclick="event.stopPropagation();window._rPreCorrect(${i})">✔</button>
                        <button class="icon-btn" style="background:#fce8e8;color:#5a3d3d;" onclick="event.stopPropagation();window._rPreWrong(${i})">✘</button>
                    </div>
                `).join('');
                const selCount = viewState.precheckWords.filter(w => w.userChoice !== null).length;
                appEl.innerHTML = `
                <div class="page active">
                    <div class="page-header">复习-学前检测 <span id="timer-display3" style="font-size:0.7rem;"></span></div>
                    <div class="scroll-list" style="flex:1;">${wordsHtml}</div>
                    <div class="fixed-bar">
                        <span>待复习: <strong id="r-wrong-count">${viewState.precheckWords.filter(w=>w.userChoice===false).length}</strong></span>

                    </div>
                </div>`;
                window._updateTimerDisplay3 = function() {

                    if (!el) return;
                    const rem = viewState.learnTimerRemaining || 0;
                    el.textContent =
                        `⏱ ${Math.floor(rem/60)}:${Math.floor(rem%60).toString().padStart(2,'0')}`;
                    if (viewState.learnTimerActive && rem > 0) setTimeout(window._updateTimerDisplay3, 1000);
                };
                window._updateTimerDisplay3();
            }
            window._toggleRPreWord = function(i) {
                const row = document.getElementById('rpw-' + i);
                if (!row) return;
                let clicks = parseInt(row.getAttribute('data-clicks') || '0');
                const w = viewState.precheckWords[i];
                const el = document.getElementById('rpm-' + i);
                if (!el || !w) return;

                if (clicks === 0) {
                    speakWord(w.english);
                } else {
                    speakWord(w.english);
                    el.style.display = (clicks % 2 === 1) ? 'inline' : 'none';
                }
                row.setAttribute('data-clicks', clicks + 1);
            };
            // 替换 _rPreCorrect
            window._rPreCorrect = function(i) {
                const w = viewState.precheckWords[i];
                if (!w || w.userChoice !== null) return;
                w.userChoice = true;
                const row = document.getElementById('rpw-' + i);
                if (row) { row.classList.add('correct'); row.classList.remove('wrong'); }

                // 更新学生进度
                const teacher = appData.currentUser;
                const freshTeacher = getTeacherById(teacher.id);
                appData.currentUser = freshTeacher;
                const studentId = selectedStudentIdGlobal;
                const student = getStudentById(freshTeacher, studentId);
                const bankId = selectedBankIdGlobal;
                if (student && bankId) {
                    if (!student.wordProgress) student.wordProgress = {};
                    if (!student.wordProgress[bankId]) student.wordProgress[bankId] = {};
                    const prog = student.wordProgress[bankId];
                    if (prog[w.id]) {
                        prog[w.id].reviewCount = (prog[w.id].reviewCount || 0) + 1;
                        prog[w.id].reviewDates = prog[w.id].reviewDates || [];
                        prog[w.id].reviewDates.push(new Date().toISOString());
                        if (prog[w.id].reviewCount >= 10) prog[w.id].status = 'done';
                    } else {
                        prog[w.id] = { status: 'learning', reviewCount: 1, learnedDate: new Date().toISOString(), reviewDates: [new Date().toISOString()], postponedDays: 0 };
                    }
                }
                saveData();
                window._updateRPreUI();
            };

            window._updateRPreUI = function() {
                const wrongCount = viewState.precheckWords.filter(w => w.userChoice === false).length;
                const el = document.getElementById('r-wrong-count');
                if (el) el.textContent = wrongCount;
            };
            window._rPreWrong = function(i) {
                viewState.precheckWords[i].userChoice = false;
                document.getElementById('rpw-' + i)?.classList.add('wrong');
                window._updateRPreUI();
            };
            window._rGoLearn = function() {
                const wrong = viewState.precheckWords.filter(w => w.userChoice === false);
                if (wrong.length === 0) {
                    const allMarkedCorrect = viewState.precheckWords.every(w => w.userChoice === true);
                    if (allMarkedCorrect && viewState.precheckWords.length > 0) {
                        showToast('本次复习正确率百分百，非常棒！');
                        if (window._timerInterval) clearInterval(window._timerInterval);
                        viewState.learnTimerActive = false;
                        pausedRemainingTime = 0;
                        pausedLearnType = null;
                        appData.learningState = null;
                        saveData();
                        window._archiveLearningSession(true);
                        renderView('teacher_review_home');
                    } else {
                        showToast('请标记需要复习的单词');
                    }
                    return;
                }
                viewState.wrongInPrecheck = wrong.map(w => w.id);
                viewState.learnedInSession = viewState.precheckWords.filter(w => w.userChoice === true).map(w => w.id);
                const groups = [];
                for (let i = 0; i < wrong.length; i += 5) groups.push(wrong.slice(i, i + 5));
                viewState.learningGroups = groups;
                viewState.currentGroupIndex = 0;
                viewState.snipWords = [];
                viewState.checkoffRemaining = [];
                renderView('teacher_review_learning');
            };

            function renderTeacherReviewLearning() {
                const group = viewState.learningGroups[viewState.currentGroupIndex] || [];
                let h = group.map((w, i) => `
                    <div class="word-row" id="rlw-${i}" data-clicks="0" onclick="window._toggleRLWord(${i})">
                        <span class="word-text">${w.english}</span>
                        <span class="word-meaning" id="rlm-${i}" style="display:none;">${w.chinese}</span>
                    </div>`).join('');
                appEl.innerHTML = `
                <div class="page active">
                    <div class="page-header">复习学习 ${viewState.currentGroupIndex+1}/${viewState.learningGroups.length}</div>
                    <div class="scroll-list">${h}</div>
                    <div class="fixed-bar">
                        <button class="btn" onclick="window._rPrevGroup()">上一组</button>
                        <button class="btn" onclick="window._rNextGroup()">下一组</button>
                        <button class="btn warn" onclick="window._rGoSnip()">✂ 剪纸条</button>
                    </div>
                </div>`;
                window._rClicked = new Set();
                window._rPrevGroup = function() {
                    if (viewState.currentGroupIndex > 0) {
                        viewState.currentGroupIndex--;
                        renderView('teacher_review_learning');
                    }
                };
                window._rNextGroup = function() {
                    if (viewState.currentGroupIndex < viewState.learningGroups.length - 1) {
                        viewState.currentGroupIndex++;
                        renderView('teacher_review_learning');
                    }
                };
            }
            window._toggleRLWord = function(i) {
                const row = document.getElementById('rlw-' + i);
                if (!row) return;
                let clicks = parseInt(row.getAttribute('data-clicks') || '0');
                const g = viewState.learningGroups[viewState.currentGroupIndex];
                const w = g ? g[i] : null;
                const el = document.getElementById('rlm-' + i);
                if (!el || !w) return;

                if (clicks === 0) {
                    speakWord(w.english);
                } else {
                    speakWord(w.english);
                    el.style.display = (clicks % 2 === 1) ? 'inline' : 'none';
                }
                if (!window._rClicked) window._rClicked = new Set();
                window._rClicked.add(w.id);
                row.setAttribute('data-clicks', clicks + 1);
            };
            window._rGoSnip = function() {
                const allW = [];
                const seen = new Set();
                for (const g of viewState.learningGroups) for (const w of g) { if (!seen.has(w.id)) { seen.add(w.id);
                        allW.push(w); } }
                viewState.snipWords = allW.filter(w => window._rClicked.has(w.id));
                if (viewState.snipWords.length === 0) viewState.snipWords = [...allW];
                viewState.snipRemaining = [...viewState.snipWords];
                renderView('teacher_review_snip');
            };

            function renderTeacherReviewSnip() {
                const words = viewState.snipRemaining || [];
                let h = words.map((w, i) => `
                    <div class="word-row" style="justify-content:space-between;">
                        <span onclick="window._rSnipClick(${i})" style="flex:1;cursor:pointer;">
                            <span class="word-text">${w.english}</span>
                            <span class="word-meaning" id="rsm-${i}" style="display:none;">${w.chinese}</span>
                        </span>
                        <button class="icon-btn" style="background:#fce8e8;" onclick="window._rSnipCut(${i})">✂</button>
                    </div>`).join('');
                appEl.innerHTML = `
                <div class="page active">
                    <div class="page-header" style="display:flex;align-items:center;gap:8px;">
                        <button class="btn tiny" onclick="window._endLearningEarly()">← 返回</button>
                        <span style="flex:1;">复习-剪纸条</span>
                    </div>
                    <div class="scroll-list">${h||'<p>全部完成</p>'}</div>
                <div class="fixed-bar"><span>剩余:${words.length}</span><button class="btn success" onclick="window._rGoCheckoff()" ${words.length>0?'disabled':''}>打钩</button></div></div>`;
            }
            window._rSnipClick = function(i) {
                const w = viewState.snipRemaining[i];
                const el = document.getElementById('rsm-' + i);
                if (el && w && w.english) {
                    speakWord(w.english);
                    if (el.style.display === 'none') {
                        el.style.display = 'inline';
                    }
                }
            };
            window._rSnipCut = function(i) {
                playSnipSound();
                const w = viewState.snipRemaining[i];
                if (w) speakWord(w.english);
                document.getElementById('rsm-' + i) && (document.getElementById('rsm-' + i).style.display = 'inline');
                viewState.snipRemaining.splice(i, 1);
                viewState.snipRemaining.length === 0 ? setTimeout(() => window._rGoCheckoff(), 400) : renderView(
                    'teacher_review_snip');
            };
            window._rGoCheckoff = function() {
                viewState.checkoffRemaining = [...viewState.snipWords];
                renderView('teacher_review_checkoff');

            function renderTeacherReviewCheckoff() {
                const words = viewState.checkoffRemaining || [];
                let h = words.map((w, i) => `
                    <div class="word-row" style="justify-content:space-between;">
                        <span onclick="window._rCheckClick(${i})" style="flex:1;cursor:pointer;">
                            <span class="word-text">${w.english}</span>
                            <span class="word-meaning" id="rcm-${i}" style="display:none;">${w.chinese}</span>
                        </span>

                    </div>`).join('');
                appEl.innerHTML = `

                <div class="fixed-bar"><span>剩余:${words.length}</span></div></div>`;
            }
            window._rCheckClick = function(i) {

                    if (el.style.display === 'none') {
                        el.style.display = 'inline';

                    // 原有弹窗逻辑替换为调用指定方法

            window._showReviewPostSnipOptions = function() {

                if (!isLast) {

            window._rFinish = function() {

                const student = getStudentById(freshTeacher, studentId);
                const bankId = selectedBankIdGlobal;

                    if (!student.wordProgress) student.wordProgress = {};
                    if (!student.wordProgress[bankId]) student.wordProgress[bankId] = {};
                    const prog = student.wordProgress[bankId];
                    const correctIds = viewState._rPostWords.filter(w => w.userChoice === true).map(w => w.id);

                        if (prog[wid]) {
                            prog[wid].reviewCount = (prog[wid].reviewCount || 0) + 1;
                            prog[wid].reviewDates = prog[wid].reviewDates || [];

                }
                appData.currentUser = freshTeacher;
                appData.learningStateReview = null;
                window._archiveLearningSession();
                if (window._timerInterval) clearInterval(window._timerInterval);

            window._printRecord = function(recordId) {
                const teacher = appData.currentUser;
                const freshTeacher = getTeacherById(teacher.id);
                const record = (freshTeacher.learningRecords || []).find(r => r.id === recordId);
                if (!record) return;
                const bank = getWordBankById(freshTeacher, record.wordBankId);
                const student = getStudentById(freshTeacher, record.studentId);
                const d = new Date(record.startTime);
                const dateStr =
                    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
                // 21天遗忘曲线
                const curveDays = [1, 2, 3, 5, 7, 9, 12, 14, 17, 21];
                let calendarHtml = '<table style="width:100%;border-collapse:collapse;margin:10px 0;">';
                for (let row = 0; row < 4; row++) {
                    calendarHtml += '<tr>';
                    for (let col = 0; col < 5; col++) {
                        const idx = row * 5 + col;
                        if (idx < curveDays.length) {
                            const day = curveDays[idx];
                            const targetDate = new Date(d);
                            targetDate.setDate(targetDate.getDate() + day);
                            const tdStr =
                                `${targetDate.getFullYear()}-${(targetDate.getMonth()+1).toString().padStart(2,'0')}-${targetDate.getDate().toString().padStart(2,'0')}`;
                            calendarHtml +=
                                `<td style="border:1px solid #ccc;padding:6px;text-align:center;font-size:0.7rem;">第${day}天<br>${tdStr}<br><span style="display:inline-block;width:40px;height:18px;border-bottom:1px solid #999;"></span></td>`;
                        } else {
                            calendarHtml +=
                                '<td style="border:1px solid #eee;padding:6px;"></td>';
                        }
                    }
                    calendarHtml += '</tr>';
                }
                calendarHtml += '</table>';
                // 单词表格
                const recordWords = (bank?.words || []).filter(w => record.words.includes(w.id));
                let wordTableHtml = '<table style="width:100%;border-collapse:collapse;">';
                for (let i = 0; i < recordWords.length; i += 2) {
                    wordTableHtml += '<tr>';
                    for (let j = 0; j < 2; j++) {
                        const w = recordWords[i + j];
                        if (w) {
                            wordTableHtml += `<td style="border:1px solid #ccc;padding:4px;font-weight:600;">${w.english}</td><td style="border:1px solid #ccc;padding:4px;font-size:0.75rem;">${w.chinese}</td>`;
                        } else {
                            wordTableHtml += '<td style="border:1px solid #eee;padding:4px;"></td><td></td>';
                        }
                    }
                    wordTableHtml += '</tr>';
                }
                wordTableHtml += '</table>';
                // ---------- 新增：仅单词表格 ----------
                let wordsOnlyHtml = '<table style="width:100%;border-collapse:collapse;">';
                for (let i = 0; i < recordWords.length; i += 2) {
                    wordsOnlyHtml += '<tr>';
                    for (let j = 0; j < 2; j++) {
                        const w = recordWords[i + j];
                        if (w) {
                            wordsOnlyHtml += `<td style="border:1px solid #ccc;padding:4px;font-weight:600;">${w.english}</td><td style="border:1px solid #ccc;padding:4px;"></td>`;
                        } else {
                            wordsOnlyHtml += '<td style="border:1px solid #eee;padding:4px;"></td><td style="border:1px solid #eee;padding:4px;"></td>';
                        }
                    }
                    wordsOnlyHtml += '</tr>';
                }
                wordsOnlyHtml += '</table>';

                // ---------- 新增：仅释义表格 ----------
                let meaningsOnlyHtml = '<table style="width:100%;border-collapse:collapse;">';
                for (let i = 0; i < recordWords.length; i += 2) {
                    meaningsOnlyHtml += '<tr>';
                    for (let j = 0; j < 2; j++) {
                        const w = recordWords[i + j];
                        if (w) {
                            meaningsOnlyHtml += `<td style="border:1px solid #ccc;padding:4px;"></td><td style="border:1px solid #ccc;padding:4px;font-size:0.75rem;">${w.chinese}</td>`;
                        } else {
                            meaningsOnlyHtml += '<td style="border:1px solid #eee;padding:4px;"></td><td style="border:1px solid #eee;padding:4px;"></td>';
                        }
                    }
                    meaningsOnlyHtml += '</tr>';
                }
                meaningsOnlyHtml += '</table>';

                const reportHtml = `
                    <html><head><meta charset="UTF-8"><title>学习报告</title>
                    <style>body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;padding:20px;color:#333;max-width:700px;margin:auto;}h2{text-align:center;}table{margin:8px 0;}@media print{body{print-color-adjust:exact;}}</style></head>
                    <body>
                        <h2>📝 学习报告</h2>
                        <p><strong>学生:</strong> ${student?.name||'未知'} | <strong>时间:</strong> ${dateStr} | <strong>时长:</strong> ${record.duration}h | <strong>词库:</strong> ${bank?.name||'未知'}</p>
                        <div style="page-break-after: always;">
                            <h3>21天抗遗忘打卡</h3>${calendarHtml}
                        </div>
                        <div style="page-break-after: always;">
                            <h3>学习单词 (${recordWords.length}个)</h3>${wordTableHtml}
                        </div>
                        <div style="page-break-after: always;">
                            <h3>单词默写表</h3>${wordsOnlyHtml}
                        </div>
                        <div>
                            <h3>释义默写表</h3>${meaningsOnlyHtml}
                        </div>
                        <script>window.onload=function(){window.print();}<\/script>
                    </body></html>
                `;
                const win = window.open('', '_blank', 'width=700,height=900');
                if (win) { win.document.write(reportHtml);
                    win.document.close(); } else { showToast('请允许弹出窗口以打印报告'); }
            };

            // ==================== 学生端 ====================
            function renderStudentHome() {
                const studentData = appData.currentUser;
                if (!studentData || appData.userType !== 'student') { renderLogin(); return; }
                const teacher = getTeacherById(studentData.teacherId);
                const student = teacher ? getStudentById(teacher, studentData.id) : null;
                if (!student) { showToast('数据异常');
                    renderLogin(); return; }
                appEl.innerHTML = `
                <div class="page active">
                    <div class="page-header">📖 学生端</div>
                    <div style="text-align:center;">
                        <strong>${student.name}</strong><br>
                        <span style="font-size:0.8rem;">账号:${student.username}</span><br>
                        <span style="font-size:1rem;font-weight:700;">总课时: ${(student.remainingHours||0).toFixed(1)}h</span>
                    </div>
                    <button class="btn primary" style="width:100%;padding:16px;" onclick="renderView('student_review')">📅 抗遗忘复习</button>
                    <button class="btn" style="width:100%;padding:16px;" onclick="renderView('student_records')">📋 复习记录</button>
                    <button class="btn" style="width:100%;background:#c4b89e;" onclick="saveLearningState(); appData.currentUser=null; appData.userType=null; saveData(); renderView('login');">退出登录</button>
                </div>`;
            }

            function renderStudentReview() {
                const studentData = appData.currentUser;
                const teacher = getTeacherById(studentData.teacherId);
                const student = getStudentById(teacher, studentData.id);
                if (!student) { renderLogin(); return; }
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const todayTime = today.getTime();

                // 检查并处理延期
                const curveDays = [1, 2, 3, 5, 7, 9, 12, 14, 17, 21];
                let needSave = false;
                for (const [bankId, prog] of Object.entries(student.wordProgress || {})) {
                    for (const [wid, p] of Object.entries(prog)) {
                        if (p.status !== 'learning') continue;
                        const learnedDate = new Date(p.learnedDate);
                        learnedDate.setHours(0, 0, 0, 0);
                        const rc = p.reviewCount || 0;
                        if (rc >= curveDays.length) continue;
                        const postponed = p.postponedDays || 0;
                        const targetDay = new Date(learnedDate.getTime() + (curveDays[rc] + postponed) * 86400000);
                        targetDay.setHours(0, 0, 0, 0);
                        if (targetDay.getTime() < todayTime) {
                            const diffDays = Math.round((todayTime - targetDay.getTime()) / 86400000);
                            if (diffDays > 0) {
                                p.postponedDays = postponed + diffDays;
                                needSave = true;
                            }
                        }
                    }
                }
                if (needSave) saveData();

                // 收集今天需要复习的单词
                const reviewWords = [];
                for (const [bankId, prog] of Object.entries(student.wordProgress || {})) {
                    for (const [wid, p] of Object.entries(prog)) {
                        if (p.status !== 'learning') continue;
                        const learnedDate = new Date(p.learnedDate);
                        learnedDate.setHours(0, 0, 0, 0);
                        const rc = p.reviewCount || 0;
                        if (rc >= curveDays.length) continue;
                        const postponed = p.postponedDays || 0;
                        const targetDay = new Date(learnedDate.getTime() + (curveDays[rc] + postponed) * 86400000);
                        targetDay.setHours(0, 0, 0, 0);
                        if (targetDay.getTime() === todayTime) {
                            const reviewDates = (p.reviewDates || []).map(d => { const nd = new Date(d); nd.setHours(0,0,0,0); return nd.getTime(); });
                            if (!reviewDates.includes(todayTime)) {
                                const bank = getWordBankById(teacher, bankId);
                                const word = bank?.words.find(w => w.id === wid);
                                if (word) reviewWords.push({ ...word, bankId, userChoice: null }); // null:未选, true:正确, false:错误
                            }
                        }
                    }
                }
                viewState._studentReviewWords = reviewWords;
                viewState._studentReviewWrong = [];

                if (reviewWords.length === 0) {
                    appEl.innerHTML = `
                    <div class="page active"><div class="page-header">抗遗忘复习</div>
                    <p style="text-align:center;padding:40px;">今天没有需要复习的单词！🎉</p>
                    <button class="btn" onclick="renderView('student_home')">← 返回</button></div>`;
                    return;
                }

                // 渲染单词列表
                let wordsHtml = reviewWords.map((w, i) => `
                    <div class="word-row" id="srw-${i}" data-clicks="0" onclick="window._studentToggleWord(${i})">
                        <span class="word-text">${w.english}</span>
                        <span class="word-meaning" id="srwm-${i}" style="display:none;">${w.chinese}</span>
                        <button class="icon-btn" style="background:#dcece2;color:#3d5a48;" onclick="event.stopPropagation();window._studentCorrect(${i})">✔</button>
                        <button class="icon-btn" style="background:#fce8e8;color:#5a3d3d;" onclick="event.stopPropagation();window._studentWrong(${i})">✘</button>
                    </div>
                `).join('');

                appEl.innerHTML = `
                <div class="page active">
                    <div class="page-header">抗遗忘复习 (${reviewWords.length}词)</div>
                    <div class="scroll-list" style="flex:1;">${wordsHtml}</div>
                    <div class="fixed-bar">
                        <span></span>
                        <button class="btn primary" onclick="window._studentFinishReview()">结束复习</button>
                    </div>
                </div>`;
            }

            // 点击单词行：发音 + 显示/隐藏释义
            window._studentToggleWord = function(index) {
                const w = viewState._studentReviewWords[index];
                if (!w) return;
                speakWord(w.english);
                const meaningEl = document.getElementById('srwm-' + index);
                if (meaningEl) {
                    meaningEl.style.display = meaningEl.style.display === 'none' ? 'inline' : 'none';
                }
            };

            // 正确按钮：标记为正确，变色
            window._studentCorrect = function(index) {
                const w = viewState._studentReviewWords[index];
                if (!w || w.userChoice !== null) return; // 已标记，忽略
                w.userChoice = true;
                const row = document.getElementById('srw-' + index);
                if (row) { row.classList.add('correct'); row.classList.remove('wrong'); }
                // 显示释义（如果未显示）
                const meaningEl = document.getElementById('srwm-' + index);
                if (meaningEl && meaningEl.style.display === 'none') meaningEl.style.display = 'inline';
            };

            // 错误按钮：标记为错误，变色，记录错误单词
            window._studentWrong = function(index) {
                const w = viewState._studentReviewWords[index];
                if (!w || w.userChoice !== null) return;
                w.userChoice = false;
                const row = document.getElementById('srw-' + index);
                if (row) { row.classList.add('wrong'); row.classList.remove('correct'); }
                const meaningEl = document.getElementById('srwm-' + index);
                if (meaningEl && meaningEl.style.display === 'none') meaningEl.style.display = 'inline';
                // 记录错误单词ID
                viewState._studentReviewWrong.push(w.id);
            };

            // 结束复习：提交结果
            window._studentFinishReview = function() {
                const words = viewState._studentReviewWords;
                const unmarked = words.filter(w => w.userChoice === null);
                if (unmarked.length > 0) {
                    showToast('请先标记所有单词');
                    return;
                }
                // 更新进度
                const studentData = appData.currentUser;
                const teacher = getTeacherById(studentData.teacherId);
                const student = getStudentById(teacher, studentData.id);
                const today = new Date().toISOString();
                for (const w of words) {
                    const prog = student.wordProgress?.[w.bankId]?.[w.id];
                    if (prog) {
                        prog.reviewDates = prog.reviewDates || [];
                        prog.reviewDates.push(today);
                        prog.reviewCount = (prog.reviewCount || 0) + 1;
                        if (prog.reviewCount >= 10) prog.status = 'done';
                        if (!prog.postponedDays) prog.postponedDays = 0;
                    }
                }
                // 记录复习
                if (!student.reviewRecords) student.reviewRecords = [];
                student.reviewRecords.push({
                    id: generateId(),
                    time: today,
                    words: words.map(w => w.id),
                    wrongIds: viewState._studentReviewWrong,
                });
                saveData();
                showToast('复习完成！');
                renderView('student_home');
            };

            function renderStudentRecords() {
                const studentData = appData.currentUser;
                const teacher = getTeacherById(studentData.teacherId);
                const student = getStudentById(teacher, studentData.id);
                const records = (student?.reviewRecords || []).sort((a, b) => new Date(b.time) - new Date(a.time));
                let html = records.map(r => {
                    const d = new Date(r.time);
                    const ds = `${d.getMonth()+1}月${d.getDate()}日${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
                    // 收集完整单词信息（含中文）
                    const wordsList = [];
                    for (const wid of r.words) {
                        for (const b of (teacher?.wordBanks || [])) {
                            const w = b.words.find(ww => ww.id === wid);
                            if (w) {
                                wordsList.push({ ...w, isWrong: (r.wrongIds || []).includes(wid) });
                                break;
                            }
                        }
                    }
                    // 生成单词行，每行一个单词（英文 + 中文），错误单词行有浅红背景
                    let wh = wordsList.map(w => `
                        <div style="display:flex; justify-content:space-between; align-items:center; padding:6px 8px; margin:2px 0; border-radius:6px; ${w.isWrong ? 'background:#fce8e8;' : ''}">
                            <span style="font-weight:600; font-size:0.85rem;">${w.english}</span>
                            <span style="font-size:0.75rem; color:var(--sub); text-align:right;">${w.chinese}</span>
                        </div>
                    `).join('');
                    return `<div class="card">
                        <strong>${ds}</strong>
                        <div style="max-height:200px; overflow-y:auto; margin-top:6px;">
                            ${wh}
                        </div>
                        <span style="font-size:0.7rem; display:block; margin-top:4px;">${wordsList.length}词 | 错误:${(r.wrongIds||[]).length}</span>
                    </div>`;
                }).join('');
                if (!html) html = '<p style="text-align:center;padding:30px;">暂无复习记录</p>';
                appEl.innerHTML = `
                <div class="page active"><div class="page-header">复习记录</div>
                <div class="scroll-list">${html}</div>
                <button class="btn" onclick="renderView('student_home')">← 返回</button></div>`;
            }

            // ==================== 管理员端 ====================
            function renderAdminPanel() {
                if (appData.userType !== 'admin') { renderLogin(); return; }
                const teachers = appData.teachers.filter(t => t.role !== 'admin').sort((a, b) => new Date(b.createdDate) -
                    new Date(a.createdDate));
                let listHtml = teachers.map(t => `
                    <div class="card row" style="justify-content:space-between;flex-wrap:wrap;">
                        <div style="flex:1;min-width:120px;">
                            <strong>${t.username}</strong>
                            <br><span style="font-size:0.7rem;">总池:${(t.totalHours||0).toFixed(1)}h | 剩余:${(t.remainingHours||0).toFixed(1)}h</span>
                            <br><span style="font-size:0.65rem;">创建:${new Date(t.createdDate).toLocaleDateString()}</span>
                        </div>
                        <div class="row" style="gap:4px;">
                            <button class="btn tiny primary" onclick="window._adminSetHours('${t.id}')">设置课时</button>
                            <button class="btn tiny warn" onclick="window._adminDeleteTeacher('${t.id}')">删除</button>
                        </div>
                    </div>`).join('');
                if (!listHtml) listHtml = '<p style="text-align:center;padding:30px;">暂无教师账号</p>';
                appEl.innerHTML = `
                <div class="page active">
                    <div class="page-header">🔧 管理员面板</div>
                    <input class="input" id="admin-search" placeholder="搜索教师账号..." oninput="window._adminFilter()">
                    <div class="scroll-list" id="admin-list">${listHtml}</div>
                    <div class="card row" style="gap:8px;flex-wrap:wrap;">
                        <input class="input" id="new-teacher-username" placeholder="教师账号" style="flex:1;min-width:80px;">
                        <input class="input" id="new-teacher-password" placeholder="密码" style="flex:1;min-width:80px;">
                        <button class="btn primary small" onclick="window._adminAddTeacher()">注册教师</button>
                    </div>
                    <button class="btn" onclick="saveLearningState(); appData.currentUser=null; appData.userType=null; saveData(); renderView('login');">退出登录</button>
                </div>`;
                window._adminTeachers = teachers;
            }

            window._adminFilter = function() {
                const q = (document.getElementById('admin-search')?.value || '').toLowerCase();
                const filtered = window._adminTeachers.filter(t => t.username.toLowerCase().includes(q));
                document.getElementById('admin-list').innerHTML = filtered.map(t => `
                    <div class="card row" style="justify-content:space-between;flex-wrap:wrap;">
                        <div><strong>${t.username}</strong><br><span style="font-size:0.7rem;">总池:${(t.totalHours||0).toFixed(1)}h</span></div>
                        <div class="row" style="gap:4px;">
                            <button class="btn tiny primary" onclick="window._adminSetHours('${t.id}')">设置课时</button>
                            <button class="btn tiny warn" onclick="window._adminDeleteTeacher('${t.id}')">删除</button>
                        </div>
                    </div>`).join('') || '<p style="text-align:center;padding:30px;">无匹配</p>';
            };

            window._adminAddTeacher = function() {
                const username = document.getElementById('new-teacher-username')?.value.trim();
                const password = document.getElementById('new-teacher-password')?.value.trim();
                if (!username || !password) { showToast('请填写完整'); return; }
                if (appData.teachers.find(t => t.username === username)) { showToast('账号已存在'); return; }
                const newTeacher = {
                    id: generateId(),
                    username,
                    password,
                    role: 'teacher',
                    totalHours: 10,
                    remainingHours: 10,
                    createdDate: new Date().toISOString(),
                    students: [],
                    wordBanks: [],
                    learningRecords: [],
                };
                appData.teachers.push(newTeacher);
                appData.adminTotalHoursMap[newTeacher.id] = 10;
                saveData();
                showToast('教师注册成功');
                renderView('admin_panel');
            };

            window._adminSetHours = function(teacherId) {
                const teacher = getTeacherById(teacherId);
                if (!teacher) return;
                showOverlay(`
                    <div class="modal">
                        <h3>设置课时 - ${teacher.username}</h3>
                        <p>当前总池:${(teacher.totalHours||0).toFixed(1)}h | 剩余:${(teacher.remainingHours||0).toFixed(1)}h</p>
                        <input class="input" id="set-hours-amount" type="number" step="0.5" min="0" value="${(teacher.totalHours||10)}" style="width:100px;text-align:center;">
                        <p style="font-size:0.7rem;">设置总课时池（小时）</p>
                        <div class="row" style="justify-content:center;">
                            <button class="btn primary" onclick="window._confirmSetHours('${teacherId}')">确认</button>
                            <button class="btn" onclick="hideOverlay()">取消</button>
                        </div>
                    </div>`);
            };

            window._confirmSetHours = function(teacherId) {
                const amount = parseFloat(document.getElementById('set-hours-amount')?.value);
                if (!amount || amount < 0) { showToast('无效课时数'); return; }
                const teacher = getTeacherById(teacherId);
                if (!teacher) return;
                const oldTotal = teacher.totalHours || 0;
                teacher.totalHours = amount;
                teacher.remainingHours = Math.max(0, teacher.remainingHours + (amount - oldTotal));
                appData.adminTotalHoursMap[teacherId] = amount;
                saveData();
                hideOverlay();
                showToast(`已设置总课时为 ${amount}h`);
                renderView('admin_panel');
            };

            window._adminDeleteTeacher = function(teacherId) {
                if (!confirm('确定删除该教师账号吗？')) return;
                appData.teachers = appData.teachers.filter(t => t.id !== teacherId);
                delete appData.adminTotalHoursMap[teacherId];
                saveData();
                showToast('教师已删除');
                renderView('admin_panel');
            };

            // ==================== 初始化 ====================
            loadData();
            renderView('login');

            window.addEventListener('beforeunload', () => {
                if (viewState.learnTimerActive || viewState.learningGroups?.length > 0) {
                    if (typeof window._archiveLearningSession === 'function') {
                        window._archiveLearningSession(true);
                    }
                    // 保存倒计时和进度
                    pausedRemainingTime = viewState.learnTimerRemaining || 0;
                    pausedLearnType = viewState.learnType || null;
                    saveTimerState();
                    viewState.pausedView = currentView;
                    saveLearningState();
                }
            });

            // 暴露到全局
            window.appData = appData;
            window.saveData = saveData;
            window.loadData = loadData;
            window.renderView = renderView;
            window.showToast = showToast;
            window.showOverlay = showOverlay;
            window.hideOverlay = hideOverlay;
            window.speakWord = speakWord;
            window.playSnipSound = playSnipSound;
            window.playDingSound = playDingSound;
            window.getTeacherById = getTeacherById;
            window.getStudentById = getStudentById;
            window.getWordBankById = getWordBankById;
            window.viewState = viewState;
            window.saveLearningState = saveLearningState;

            console.log('✅ 仓仓单词系统已就绪');
            console.log('管理员账号: 17872702990 | 密码: LYwinner');
            console.log('教师可自行注册或由管理员创建');
            console.log('支持词库格式: "apple n.苹果" 或 "because of 因为"');
        })();
    </script>
</body>
</html>
